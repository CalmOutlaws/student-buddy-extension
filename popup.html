<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body { width: 350px; height: 500px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 p-4 font-sans">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">Student Buddy</h1>
        <div id="status" class="w-2 h-2 rounded-full bg-emerald-500"></div>
    </div>

    <!-- Pomodoro Section -->
    <div class="glass border border-slate-700 rounded-xl p-4 mb-4">
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm text-slate-400 uppercase tracking-wider">Focus Timer</span>
            <span id="timer" class="text-2xl font-mono font-bold">25:00</span>
        </div>
        <div class="flex gap-2">
            <button id="startTimer" class="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm transition">Start</button>
            <button id="resetTimer" class="px-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">↺</button>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="space-y-2">
        <p class="text-xs text-slate-500 font-semibold px-1">RESEARCH TOOLS</p>
        <button id="summarizeBtn" class="w-full text-left p-3 rounded-xl border border-slate-800 hover:border-blue-500/50 hover:bg-blue-500/5 transition group">
            <div class="font-medium text-sm">Summarize Page</div>
            <div class="text-xs text-slate-500">Get key takeaways using AI</div>
        </button>
        <button id="saveNoteBtn" class="w-full text-left p-3 rounded-xl border border-slate-800 hover:border-emerald-500/50 hover:bg-emerald-500/5 transition">
            <div class="font-medium text-sm text-emerald-400">Save to Dashboard</div>
            <div class="text-xs text-slate-500">Syncs with your Supabase DB</div>
        </button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
