<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1 class="title">Student Buddy Pro</h1>
        <div id="status" class="w-2 h-2 rounded-full" style="width: 10px; height: 10px; border-radius: 50%; background-color: #10b981;"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: var(--text-dim); text-transform: uppercase;">Focus Session</span>
            <span id="timer" class="timer-val">25:00</span>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 12px;">
            <button id="startTimer" class="btn-main">Start Session</button>
            <button id="resetTimer" class="btn-secondary" style="width: 45px; text-align: center; margin-bottom: 0;">↺</button>
        </div>
    </div>

    <div style="margin-top: 24px;">
        <p style="font-size: 11px; color: var(--text-dim); font-weight: 600; margin-bottom: 12px; letter-spacing: 0.05em;">RESEARCH TOOLS</p>
        
        <button id="summarizeBtn" class="btn-secondary">
            <div style="font-weight: 600; font-size: 13px;">Summarize Page</div>
            <div style="font-size: 11px; color: var(--text-dim);">Extract key takeaways via AI</div>
        </button>

        <button id="saveNoteBtn" class="btn-secondary">
            <div style="font-weight: 600; font-size: 13px; color: #60a5fa;">Save to Dashboard</div>
            <div style="font-size: 11px; color: var(--text-dim);">Sync current tab to Supabase</div>
        </button>
    </div>

    <div style="margin-top: 24px;">
        <p style="font-size: 11px; color: var(--text-dim); font-weight: 600; margin-bottom: 12px; letter-spacing: 0.05em;">RECENT SAVES</p>
        <div id="notesList">
            </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
